<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <style>
    html, body { width: 1280px; height: 576px; margin: 0; overflow: hidden; background: #000; }
    canvas { display: block; width: 1280px; height: 576px; }
  </style>
</head>
<body>
  <canvas id="canvas" width="1280" height="576"></canvas>
  <script type="module">
    import { loadNyankoClubAssets, NyankoClubRenderer } from "./nyanko-club-renderer.js";

    const renderer = new NyankoClubRenderer(document.querySelector("#canvas"), await loadNyankoClubAssets());
    renderer.setValues({
      certificationRank: 12,
      memberNumber: 12245,
      userRank: 82918,
      medalCount: 126,
      playHours: 9999,
      playMinutes: 59,
      ownedCats: 826,
      enemyCats: 612,
      abyss177: 9999,
      abyss176: 9999,
      abyss175: 9999,
      abyss174: 9999,
    });
    renderer.render();
    document.body.dataset.ready = "true";
  </script>
</body>
</html>
