<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark light">
  <title>ランキング調査 | KBC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/kbc-common.css">
  <link rel="stylesheet" href="/ranking.css">
  <script type="module" src="/_lab/kbc-theme.js"></script>
</head>
<body class="kbc-page">
  <div class="site-shell fade-in">
    <header class="site-header">
      <a class="brand" href="/" aria-label="KBC ホーム">
        <img class="brand-logo" src="/assets/kbc-logo.png" alt="">
        <span><strong class="brand-name">KBC</strong><small class="brand-tool-name">ランキング調査</small></span>
      </a>
      <div class="header-actions">
        <div class="theme-switcher" role="group" aria-label="テーマ">
          <button class="theme-button" type="button" data-theme-value="original" aria-label="オリジナルテーマ">●</button>
          <button class="theme-button" type="button" data-theme-value="dark" aria-label="ダークテーマ">◐</button>
          <button class="theme-button" type="button" data-theme-value="light" aria-label="ライトテーマ">○</button>
        </div>
        <a class="header-home-link" href="/">Home</a>
      </div>
    </header>

    <main>
      <div class="page-intro">
        <h1>ランキング調査</h1>
        <p>使い捨てアカウントで公式ランキングの現在ボーダーを確認します。</p>
      </div>
      <div class="kbc-form-grid">
        <section class="kbc-panel ranking-form">
          <div class="card-header"><h2>送信データ</h2><span class="category-tag">REQUEST</span></div>
          <label>ランキング
            <select id="event">
              <option value="85001" data-country="ja" data-stage="11047" data-api="legacy">通常ランキング — stage 11047 / ranking 85001</option>
              <option value="90011" data-country="en" data-stage="33000" data-api="v2">グランドアビス EN — stage 33000 / ranking 90011</option>
            </select>
          </label>
          <div id="normalFields"><label>スコア<input id="score" type="number" min="1" step="1" value="1"></label></div>
          <div id="abyssFields" class="two hidden">
            <label>到達階層<input id="floor" type="number" min="0" step="1" value="1"></label>
            <label>残キャラ数<input id="remaining" type="number" min="0" max="999" step="1" value="1"></label>
          </div>
          <div class="facts">
            <div class="fact"><small>送信ranking ID</small><b id="rankingId">85001</b></div>
            <div class="fact"><small>送信score</small><b id="encodedScore">1</b></div>
          </div>
          <div class="kbc-warning">実行すると公式サーバーへ得点を1回送信します。既存セーブは使わず、毎回新しい調査用アカウントを発行します。</div>
          <button id="submit" class="kbc-primary">公式サーバーへ送信して確認</button>
          <button id="metadata" class="kbc-secondary hidden">開催情報だけ取得</button>
          <p id="status" role="status"></p>
        </section>

        <section class="kbc-panel ranking-result">
          <div class="card-header"><h2>現在の判定</h2><span class="category-tag">RESULT</span></div>
          <div class="percent"><div><strong id="percentile">—</strong><span>上位パーセント</span></div></div>
          <div class="facts">
            <div class="fact"><small>返却score</small><b id="resultScore">—</b></div>
            <div class="fact"><small>報酬帯</small><b id="rewardCount">—</b></div>
            <div class="fact"><small>終了</small><b id="closed">—</b></div>
            <div class="fact"><small>集計完了</small><b id="completed">—</b></div>
          </div>
          <details><summary>レスポンス詳細</summary><pre id="raw">まだ取得していません。</pre></details>
        </section>
      </div>
    </main>
    <footer class="site-footer">KBC</footer>
  </div>
  <script src="/_lab/ranking.js" defer></script>
</body>
</html>
