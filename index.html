<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark light">
  <title>KBC Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="icon" href="/assets/kbc-logo.png">
  <link rel="stylesheet" href="/kbc-common.css">
  <script type="module" src="/_lab/kbc-theme.js"></script>
</head>
<body class="kbc-page">
  <div class="site-shell fade-in">
    <header class="site-header">
      <a class="brand" href="/" aria-label="KBC ホーム">
        <img class="brand-logo" src="/assets/kbc-logo.png" alt="">
        <span><strong class="brand-name">KBC</strong><small class="brand-tool-name">Tools</small></span>
      </a>
      <div class="header-actions">
        <div class="theme-switcher" role="group" aria-label="テーマ">
          <button class="theme-button" type="button" data-theme-value="original" aria-label="オリジナルテーマ">●</button>
          <button class="theme-button" type="button" data-theme-value="dark" aria-label="ダークテーマ">◐</button>
          <button class="theme-button" type="button" data-theme-value="light" aria-label="ライトテーマ">○</button>
        </div>
        <a class="header-home-link" href="/" aria-current="page">Home</a>
      </div>
    </header>

    <main>
      <div class="page-intro">
        <h1>KBC Tools</h1>
        <p>使用するツールを選んでください。</p>
      </div>
      <nav class="tool-grid" aria-label="ツール一覧">
        <a class="tool-card" href="/save-editor">
          <div class="card-header"><h2>セーブデータエディタ</h2><span class="category-tag">SAVE</span></div>
          <p>セーブデータの確認、編集、引継ぎコードの取得・発行を行います。</p>
          <span class="open">開く →</span>
        </a>
        <a class="tool-card" href="/nyanko-club-forgery">
          <div class="card-header"><h2>にゃんこクラブ偽装</h2><span class="category-tag">CLUB</span></div>
          <p>にゃんこクラブの会員証表示を編集し、画像として出力します。</p>
          <span class="open">開く →</span>
        </a>
        <a class="tool-card" href="/tools/ranking">
          <div class="card-header"><h2>ランキング調査</h2><span class="category-tag">RANKING</span></div>
          <p>公式ランキングへ調査用スコアを送り、現在の上位パーセントを確認します。</p>
          <span class="open">開く →</span>
        </a>
        <a class="tool-card" href="/tools/motion">
          <div class="card-header"><h2>キャラモーション確認</h2><span class="category-tag">MOTION</span></div>
          <p>private素材を読み込み、公式準拠のWebGL描画でモーションを確認します。</p>
          <span class="open">開く →</span>
        </a>
      </nav>
    </main>
    <footer class="site-footer">KBC</footer>
  </div>
</body>
</html>
