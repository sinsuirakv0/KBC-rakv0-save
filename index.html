<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark light">
  <title>KBC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="icon" href="/assets/kbc-logo.png">
  <link rel="stylesheet" href="/kbc-common.css">
  <script type="module" src="/_lab/kbc-theme.js"></script>
</head>
<body class="kbc-page">
  <div class="site-shell fade-in">
    <header class="site-header">
      <a class="brand" href="/" aria-label="KBC ホーム">
        <img class="brand-logo" src="/assets/kbc-logo.png" alt="">
        <strong class="brand-name">KBC</strong>
      </a>
      <div class="header-actions">
        <div class="theme-switcher" role="group" aria-label="テーマ">
          <button class="theme-button" type="button" data-theme-value="original" aria-label="オリジナルテーマ">●</button>
          <button class="theme-button" type="button" data-theme-value="dark" aria-label="ダークテーマ">◐</button>
          <button class="theme-button" type="button" data-theme-value="light" aria-label="ライトテーマ">○</button>
        </div>
        <a class="header-home-link" href="/" aria-current="page">Home</a>
      </div>
    </header>

    <main>
      <div class="tool-grid home-grid">
        <section class="tool-card">
          <h2>セーブ</h2>
          <ul class="link-list">
            <li><a href="/save-editor">セーブデータエディタ</a></li>
            <li><a href="/nyanko-club-forgery">にゃんこクラブ偽装</a></li>
          </ul>
        </section>
        <section class="tool-card">
          <h2>調査</h2>
          <ul class="link-list">
            <li><a href="/tools/ranking">ランキング調査</a></li>
            <li><a href="/tools/motion">キャラモーション確認</a></li>
          </ul>
        </section>
      </div>
    </main>
    <footer class="site-footer">KBC</footer>
  </div>
</body>
</html>
