<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KBC Tools</title>
  <style>
    :root { color-scheme: dark; --bg:#0e1118; --panel:#191f2a; --line:#30394a; --text:#f5f7fb; --muted:#a7b0bf; --yellow:#ffd83d; }
    * { box-sizing: border-box; }
    body { min-height:100vh; margin:0; display:grid; place-items:center; font-family:"Yu Gothic UI",Meiryo,sans-serif; color:var(--text); background:radial-gradient(circle at 50% -10%,#2a3650 0,transparent 46%),var(--bg); }
    main { width:min(960px,calc(100% - 32px)); padding:48px 0; }
    header { display:flex; align-items:center; gap:18px; margin-bottom:30px; }
    header img { width:72px; height:72px; object-fit:contain; filter:drop-shadow(0 8px 12px #0008); }
    h1 { margin:0; font-size:clamp(30px,6vw,48px); letter-spacing:.03em; }
    header p { margin:7px 0 0; color:var(--muted); }
    .tools { display:grid; grid-template-columns:repeat(2,1fr); gap:18px; }
    .tool { min-height:230px; padding:22px; display:flex; flex-direction:column; color:inherit; text-decoration:none; border:1px solid var(--line); border-radius:18px; background:color-mix(in srgb,var(--panel) 95%,transparent); box-shadow:0 18px 45px #0004; transition:transform .16s ease,border-color .16s ease,background .16s ease; }
    .tool:hover { transform:translateY(-4px); border-color:var(--yellow); background:#202838; }
    .icon { font-size:42px; line-height:1; margin-bottom:30px; }
    h2 { margin:0 0 10px; font-size:20px; }
    .tool p { margin:0; color:var(--muted); line-height:1.65; font-size:14px; }
    .open { margin-top:auto; padding-top:24px; color:var(--yellow); font-weight:800; }
    footer { margin-top:24px; color:#778193; font-size:12px; text-align:center; }
    @media (max-width:760px) { body { place-items:start center; } main { padding-top:28px; } .tools { grid-template-columns:1fr; } .tool { min-height:180px; } .icon { margin-bottom:20px; } }
  </style>
</head>
<body>
  <main>
    <header>
      <img src="/assets/kbc-logo.png" alt="KBC">
      <div><h1>KBC Tools</h1><p>使用するツールを選んでください。</p></div>
    </header>
    <nav class="tools" aria-label="ツール一覧">
      <a class="tool" href="/save-editor">
        <span class="icon" aria-hidden="true">💾</span>
        <h2>セーブデータエディタ</h2>
        <p>セーブデータの確認、編集、引継ぎコードの発行を行います。</p>
        <span class="open">開く →</span>
      </a>
      <a class="tool" href="/nyanko-club-forgery">
        <span class="icon" aria-hidden="true">🐈</span>
        <h2>クラブ偽造</h2>
        <p>にゃんこクラブの会員証表示を編集し、画像として出力します。</p>
        <span class="open">開く →</span>
      </a>
      <a class="tool" href="/tools/ranking">
        <span class="icon" aria-hidden="true">🏆</span>
        <h2>ランキング調査</h2>
        <p>公式ランキングへ調査用スコアを送り、現在の上位パーセントを確認します。</p>
        <span class="open">開く →</span>
      </a>
      <a class="tool" href="/tools/motion">
        <span class="icon" aria-hidden="true">🎞️</span>
        <h2>キャラモーション確認</h2>
        <p>private素材からキャラクターを読み込み、公式準拠のWebGL描画でモーションを確認します。</p>
        <span class="open">開く →</span>
      </a>
    </nav>
    <footer>KBC-rakv0-save local tools</footer>
  </main>
</body>
</html>
